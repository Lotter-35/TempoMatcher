<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TempoMatcher</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════ HEADER ═══════════════════════════ -->
  <header id="app-header">
    <div id="app-title">
      <span class="title-tempo">TEMPO</span><span class="title-matcher">MATCHER</span>
    </div>
    <div id="file-info">
      <span id="file-name">Aucun fichier chargé</span>
      <button id="btn-load-file" title="Charger un fichier audio">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Charger
      </button>
      <input type="file" id="file-input" accept="audio/*" style="display:none" />
    </div>
  </header>

  <!-- ═══════════════════════════ WAVEFORM ═══════════════════════════ -->
  <section id="waveform-section">
    <div id="drop-overlay">
      <div id="drop-message" style="cursor:pointer" title="Cliquer pour charger un fichier">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p>Glissez un fichier audio ici</p>
        <span>ou <strong>cliquez ici</strong> / bouton <strong>Charger</strong></span>
      </div>
    </div>
    <canvas id="waveform-canvas"></canvas>

    <!-- Time ruler -->
    <canvas id="ruler-canvas"></canvas>

    <!-- Zoom controls -->
    <div id="zoom-controls">
      <button id="btn-zoom-out" title="Zoom arrière">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <span id="zoom-label">100%</span>
      <button id="btn-zoom-in" title="Zoom avant">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <button id="btn-zoom-fit" title="Tout afficher">FIT</button>
    </div>
  </section>

  <!-- ═══════════════════════════ RESIZE HANDLE ══════════════════════════ -->
  <div id="wave-resize-handle" title="Glisser pour redimensionner"></div>

  <!-- ═══════════════════════════ TRANSPORT ═══════════════════════════ -->
  <section id="transport-section">
    <div id="transport-left">
      <button id="btn-play" class="btn-play" disabled title="Play / Pause">
        <svg id="icon-play" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg id="icon-pause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button id="btn-stop" disabled title="Stop">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="1"/></svg>
      </button>
      <button id="btn-loop" disabled class="loop-btn" title="Lecture en boucle">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
    </div>

    <div id="time-display">
      <span id="time-current">0:00.000</span>
      <span class="time-sep">/</span>
      <span id="time-total">0:00.000</span>
    </div>

    <div id="transport-right">
      <label class="ctrl-label" for="volume-slider">VOL</label>
      <input type="range" id="volume-slider" min="0" max="4" step="0.05" value="0.8" />
      <span id="volume-pct" class="slider-pct">80%</span>
    </div>
  </section>

  <!-- ═══════════════════════════ BEAT GRID ═══════════════════════════ -->
  <section id="metronome-section">

    <!-- BPM -->
    <div class="metro-group" id="bpm-group">
      <div class="metro-group-title">BPM</div>
      <div class="metro-row">
        <button class="btn-nudge" id="bpm-dec-big" title="-5">−5</button>
        <button class="btn-nudge" id="bpm-dec" title="-1">−1</button>
        <input type="number" id="bpm-input" min="20" max="320" value="120" step="0.1" />
        <button class="btn-nudge" id="bpm-inc" title="+1">+1</button>
        <button class="btn-nudge" id="bpm-inc-big" title="+5">+5</button>
      </div>
      <input type="range" id="bpm-slider" min="20" max="320" step="0.1" value="120" />
      <div class="bpm-tap-row">
        <button id="btn-tap" title="Tapper le tempo">TAP</button>
        <button id="btn-detect" title="Détecter le BPM automatiquement">AUTO-DÉTECT</button>
        <button id="btn-bpm-half" title="Diviser le BPM par 2">÷2</button>
        <button id="btn-bpm-double" title="Multiplier le BPM par 2">×2</button>
      </div>
    </div>

    <!-- Time signature -->
    <div class="metro-group" id="timesig-group">
      <div class="metro-group-title">MESURE</div>
      <div class="metro-select-row" style="flex-direction:column;gap:8px;">
        <div class="select-block">
          <label>Temps par mesure</label>
          <div class="seg-btn-group" id="beats-per-measure">
            <button class="seg-btn" data-val="2">2</button>
            <button class="seg-btn active" data-val="4">4</button>
            <button class="seg-btn" data-val="3">3</button>
            <button class="seg-btn" data-val="6">6</button>
          </div>
        </div>
        <div class="select-block">
          <label>Mesures par boucle</label>
          <div class="seg-btn-group" id="measures-per-loop">
            <button class="seg-btn" data-val="1">1</button>
            <button class="seg-btn" data-val="2">2</button>
            <button class="seg-btn active" data-val="4">4</button>
            <button class="seg-btn" data-val="8">8</button>
          </div>
        </div>
        <div class="select-block">
          <label>Boucles par bande colorée</label>
          <div class="seg-btn-group" id="loops-per-group">
            <button class="seg-btn" data-val="1">1</button>
            <button class="seg-btn" data-val="2">2</button>
            <button class="seg-btn active" data-val="4">4</button>
            <button class="seg-btn" data-val="8">8</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Offset -->
    <div class="metro-group" id="offset-group">
      <div class="metro-group-title">DÉCALAGE</div>
      <div class="metro-row">
        <button class="btn-nudge" id="offset-dec" title="-10ms">−10ms</button>
        <input type="number" id="offset-input" min="-10" max="10" step="0.001" value="0" />
        <span class="unit-label">s</span>
        <button class="btn-nudge" id="offset-inc" title="+10ms">+10ms</button>
      </div>
      <input type="range" id="offset-slider" min="-5" max="5" step="0.001" value="0" />
    </div>

    <!-- Metronome toggle & volume -->
    <div class="metro-group" id="click-group">
      <div class="metro-group-title">CLIC</div>
      <div class="click-toggle-row">
        <button id="btn-metro-toggle" class="toggle-btn active" title="Activer / désactiver le clic">ON</button>
      </div>
      <div class="vol-row">
        <label class="ctrl-label" for="metro-vol-slider">VOLUME</label>
        <span id="metro-vol-pct" class="slider-pct">70%</span>
      </div>
      <input type="range" id="metro-vol-slider" min="0" max="4" step="0.05" value="1" />

      <!-- Beat colours legend -->
      <div class="beat-legend">
        <span class="legend-item"><span class="legend-dot" id="dot-loop"></span>Début boucle</span>
        <span class="legend-item"><span class="legend-dot" id="dot-down"></span>Temps 1</span>
        <span class="legend-item"><span class="legend-dot" id="dot-beat"></span>Temps 2-4</span>
      </div>
    </div>

    <!-- Amplitude waveform -->
    <div class="metro-group" id="amplitude-group">
      <div class="metro-group-title">AMPLITUDE</div>
      <div class="vol-row">
        <label class="ctrl-label">SCALE</label>
        <span id="amplitude-pct" class="slider-pct">100%</span>
      </div>
      <input type="range" id="amplitude-slider" min="0.05" max="4" step="0.01" value="0.5" />
    </div>

    <!-- Wave style -->
    <div class="metro-group" id="wavestyle-group">
      <div class="metro-group-title">COULEUR ONDE</div>
      <div class="color-pick-row">
        <label class="ctrl-label">COULEUR</label>
        <input type="color" id="wave-color-picker" value="#3d8edd" title="Couleur de l'onde" />
      </div>
      <div class="vol-row">
        <label class="ctrl-label" for="wave-opacity-slider">OPACITÉ</label>
        <span id="wave-opacity-pct" class="slider-pct">100%</span>
      </div>
      <input type="range" id="wave-opacity-slider" min="0" max="1" step="0.01" value="1" />
    </div>

    <!-- Visibilité marqueurs -->
    <div class="metro-group" id="markers-group">
      <div class="metro-group-title">MARQUEURS</div>
      <div class="marker-toggles">
        <div class="marker-row">
          <button id="btn-show-loop" class="toggle-btn active" title="Afficher / masquer">BOUCLE</button>
          <input type="color" id="color-loop" value="#ff3355" title="Couleur boucle" />
        </div>
        <div class="marker-row">
          <button id="btn-show-measure" class="toggle-btn active" title="Afficher / masquer">MESURE</button>
          <input type="color" id="color-measure" value="#ff8800" title="Couleur mesure" />
        </div>
        <div class="marker-row">
          <button id="btn-show-beat" class="toggle-btn active" title="Afficher / masquer">TEMPS</button>
          <input type="color" id="color-beat" value="#33dd88" title="Couleur temps" />
        </div>
      </div>
    </div>

  </section>

  <!-- Loading overlay -->
  <div id="loading-overlay">
    <div id="loading-bar-track"><div id="loading-bar"></div></div>
    <span id="loading-label">Décodage audio…</span>
  </div>

  <script src="js/metronome.js"></script>
  <script src="js/waveform.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
